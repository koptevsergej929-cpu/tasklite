<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskLite - Kanban</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="kanban">
    <header class="header">
        <div class="container header__container">
            <div class="header__title">TaskLite</div>
        </div>
        <nav class="tabs">
            <a href="index.html" class="tab">To Do</a>
            <a href="kanban.html" class="tab active">Kanban</a>
            <a href="habits.html" class="tab">Привычки</a>
        </nav>
    </header>
    <main class="container">
        <h1 class="page-title">Доска задач</h1>
<div class="board">


  <div class="column" data-status="todo">
  <div class="column__header">
    <h2>To Do</h2>
    <span class="column__count">0</span>
  </div>
   <div class="task-list">
    <button class="add-task">+ Добавить задачу</button>
  </div>
  </div>




  <div class="column" data-status="in-progress">
  <div class="column__header">
    <h2>In Progress</h2>
    <span class="column__count">0</span>
  </div>

  <div class="task-list">
    <button class="add-task">+ Добавить задачу</button>
  </div>

</div>


  <div class="column" data-status="done">
    <div class="column__header">
      <h2>Done</h2>
      <span class="column__count">0</span>
    </div>
    <div class="task-list">
      <button class="add-task">+ Добавить задачу</button>
    </div>
  </div>
</div>

    </main>

    <script src="kanban.js"></script>
</body>

</html>
